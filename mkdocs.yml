site_name: AXSDK Documentation
site_description: AXSDK Official Documentation
site_author: AXSDK Team
site_url: https://layorixinc.github.io/axsdk

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes

plugins:
  - search:
      lang:
        - en
        - ko
  - i18n:
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: ko
          name: 한국어
          build: true

extra_css:
  - stylesheets/extra.css

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: 한국어
      link: /ko/
      lang: ko
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/layorixinc/axsdk-sdk-js

nav:
  - 🏠 Introduction to Agentic UX: index.md
  - 🚀 Getting Started:
    - Overview: getting-started/index.md
    - Installation: getting-started/installation.md
    - Implementation Guide: getting-started/quickstart.md
  - 🔒 AXSDK Core:
    - App Authorization: core/authorization.md
  - 🌐 Resources:
    - Website: resources/website.md
    - Live Demo: resources/live-demo.md
  - 📖 API Reference: api/index.md
  - 📚 Tutorials:
    - Overview: tutorials/index.md
    - Conversational Navigation: tutorials/conversational-navigation.md
  - 📝 Changelog: changelog.md
